{% load static %}

<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Medical Record</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: #f4f7fb;
        font-family: 'Segoe UI', sans-serif;
    }

    .upload-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .upload-card {
        width: 100%;
        max-width: 600px;
        background: #ffffff;
        padding: 35px;
        border-radius: 15px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }

    .upload-title {
        text-align: center;
        font-weight: 600;
        color: #2575fc;
        margin-bottom: 30px;
    }

    label {
        font-weight: 500;
        margin-bottom: 6px;
        color: #333;
    }

    textarea {
        resize: none;
    }

    .btn-upload {
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        border: none;
        color: #fff;
        font-weight: 500;
        padding: 10px 30px;
        border-radius: 30px;
        transition: 0.3s ease;
    }

    .btn-upload:hover {
        opacity: 0.9;
        transform: translateY(-1px);
    }
</style>


</head>

<body>

<div class="upload-wrapper">
    <div class="upload-card">


    <h4 class="upload-title">Upload Medical Record</h4>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Description -->
        <div class="mb-3">
            <label>Description</label>
            <textarea
                name="description"
                class="form-control"
                rows="4"
                placeholder="Example: Blood test report, Scan result, Prescription copy"
                required>
            </textarea>
        </div>

        <!-- File Upload -->
        <div class="mb-4">
            <label>Upload File</label>
            <input
                type="file"
                name="file"
                class="form-control"
                required>
        </div>

        <!-- Submit Button -->
        <div class="text-center">
            <button type="submit" class="btn btn-upload">
                Upload Record
            </button>
        </div>
    </form>

</div>


</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
