  {% load static %}
{% include 'Admin/header.html' %}
<div class="main-panel">
        <div class="content-wrapper">
          {% include 'Admin/messages.html' %}
          <div class="row">
            <div class="col-lg-6 grid-margin stretch-card">
              <div class="card">
                <div class="card-body">
                  <h4 class="card-title">District Table</h4>
                  
                  <div class="table-responsive">
                    <table class="table">
                      <thead>

                        <tr>
                          <th>ID</th>
                          <th>DISTRICT</th>
                          
                        </tr>
                      </thead>
                      <tbody>
                        {% for d in dist %}
                        <tr>
                          <td>{{d.district_id}}</td>
                          <td>{{d.district_name}}</td>
                          <td>
                            <a href="{% url 'editdistrict' id=d.district_id %}" >EDIT</a>
                          </td>
                          <td>
                            <a href="{% url 'deletedistrict' id=d.district_id %}">DELETE</a>
                          </td>
                        </tr>
                       
                      </tbody>
                      {% endfor %}
                    </table>
                  </div>
                </div>
              </div>
            </div>
            
          {% include 'Admin/footer.html' %}
