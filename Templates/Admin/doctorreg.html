{% load static %}
{% include 'Admin/header.html' %}

<div class="main-panel">
    <div class="content-wrapper">
        {% include 'Admin/messages.html' %}

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="font-weight-bold mb-0">Doctor Registration</h3>
            <a href="javascript:history.back()" class="btn btn-secondary btn-sm">← Back</a>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10 grid-margin stretch-card">
                <div class="card">
                    <div class="card-body">
                        <h4 class="card-title">Register New Doctor</h4>
                        <p class="card-description">Enter doctor's professional details</p>

                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Doctor Name</label>
                                        <input type="text" class="form-control"
                                               placeholder="Enter Doctor Name"
                                               name="doctorname"
                                               required minlength="2" maxlength="100"
                                               pattern="[A-Za-z .'-]+">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Email Address</label>
                                        <input type="email" class="form-control"
                                               placeholder="Enter Email"
                                               name="demail"
                                               required maxlength="254">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Password</label>
                                        <input type="password" class="form-control"
                                               placeholder="Enter Password"
                                               name="pw"
                                               required minlength="6" maxlength="128">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Specialization</label>
                                        <input type="text" class="form-control"
                                               placeholder="Eg: Gynecologist"
                                               name="specialization"
                                               required minlength="2" maxlength="100">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Experience</label>
                                        <input type="text" class="form-control"
                                               placeholder="Eg: 5 years"
                                               name="experience"
                                               required minlength="1" maxlength="50"
                                               pattern="[0-9]+(\s*years?)?">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Contact Number</label>
                                        <input type="tel" class="form-control"
                                               placeholder="Enter 10 digit phone number"
                                               name="contact"
                                               required pattern="\d{10}">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Hospital Timing</label>
                                        <input type="text" class="form-control"
                                               placeholder="Eg: 9:00 AM - 2:00 PM"
                                               name="timing"
                                               required minlength="3" maxlength="100">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Doctor Photo</label>
                                        <input type="file"
                                               class="form-control"
                                               name="dimage"
                                               required accept="image/*">
                                    </div>
                                </div>
                            </div>

                            <div class="mt-3">
                                <button type="submit" class="btn btn-primary mr-2">Register Doctor</button>
                                <button type="reset" class="btn btn-light">Clear</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    {% include 'Admin/footer.html' %}
</div>
