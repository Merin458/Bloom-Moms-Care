{% load static %}
{% include 'Admin/header.html' %}
<div class="main-panel">
    <div class="content-wrapper">
        {% include 'Admin/messages.html' %}

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="font-weight-bold mb-0">Patient Registration</h3>
            <a href="javascript:history.back()" class="btn btn-secondary btn-sm">← Back</a>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10 grid-margin stretch-card">

            <div class="card">
                <div class="card-body">

                    <h4 class="card-title">Register New Patient</h4>
                    <p class="card-description">
                        Enter patient details below
                    </p>

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="row">

                            <!-- Patient Name -->
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Patient Name</label>
                                    <input type="text" class="form-control"
                                           placeholder="Enter Patient Name"
                                           name="patientname"
                                           required minlength="2" maxlength="100"
                                           pattern="[A-Za-z .'-]+">
                                </div>
                            </div>

                            <!-- Doctor -->
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Consulting Doctor</label>
                                    <select class="form-control" name="ddldoctor" required>
                                        <option value="">-- Select Doctor --</option>
                                        {% for d in doc %}
                                        <option value="{{ d.doctor_id }}">{{ d.doctor_name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>

                            <!-- Age -->
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Age</label>
                                    <input type="number" class="form-control"
                                           placeholder="Age"
                                           name="age"
                                           required min="10" max="60">
                                </div>
                            </div>

                            <!-- Email -->
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" class="form-control"
                                           placeholder="Enter Email"
                                           name="pemail"
                                           required maxlength="254">
                                </div>
                            </div>

                            <!-- Password -->
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Password</label>
                                    <input type="password" class="form-control"
                                           placeholder="Enter Password"
                                           name="pw"
                                           required minlength="6" maxlength="128">
                                </div>
                            </div>

                            <!-- Contact -->
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Contact Number</label>
                                    <input type="tel" class="form-control"
                                           placeholder="Enter 10 digit number"
                                           name="contact"
                                           required pattern="\d{10}">
                                </div>
                            </div>

                            <!-- Address -->
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Address</label>
                                    <input type="text" class="form-control"
                                           placeholder="Enter Address"
                                           name="address"
                                           required minlength="5" maxlength="200">
                                </div>
                            </div>

                            <!-- Blood Group -->
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Blood Group</label>
                                    <input type="text" class="form-control"
                                           placeholder="Eg: O+"
                                           name="bgroup"
                                           required pattern="(A|B|AB|O)[+-]">
                                </div>
                            </div>

                            <!-- Last Cycle Date -->
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Last Cycle Date</label>
                                    <input type="date" class="form-control"
                                           name="lcd"
                                           required>
                                    <small class="form-text text-muted">Expected delivery date will be auto-calculated (LCD + 280 days)</small>
                                </div>
                            </div>

                            <!-- Image -->
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Patient Photo</label>
                                    <input type="file"
                                           class="form-control"
                                           name="pimage"
                                           required accept="image/*">
                                </div>
                            </div>

                        </div>

                        <!-- Buttons -->
                        <div class="mt-3">
                            <button type="submit" class="btn btn-primary mr-2">
                                Register Patient
                            </button>

                            <button type="reset" class="btn btn-light">
                                Clear
                            </button>
                        </div>

                    </form>

                </div>
            </div>

            </div>
        </div>
    </div>
    
    {% include 'Admin/footer.html' %}
</div>
