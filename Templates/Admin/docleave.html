{% load static %}
{% include 'Admin/header.html' %}
<div class="main-panel">
    <div class="content-wrapper">
        {% include 'Admin/messages.html' %}

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="font-weight-bold mb-0">Doctor Leave Management</h3>
            <a href="javascript:history.back()" class="btn btn-secondary btn-sm">← Back</a>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10 grid-margin stretch-card">

            <div class="card">
                <div class="card-body">

                    <h4 class="card-title">Add Doctor Leave</h4>
                    <p class="card-description">
                        Record doctor unavailable dates
                    </p>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="row">

                            <!-- Doctor -->
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Select Doctor</label>
                                    <select class="form-control" name="doctor" required>
                                        <option value="">-- Select Doctor --</option>
                                        {% for d in doctors %}
                                        <option value="{{ d.doctor_id }}">
                                            {{ d.doctor_name }}
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>

                            <!-- Leave Date -->
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Leave Date</label>
                                    <input type="date"
                                         id="leave_date"
                                           class="form-control"
                                           name="leave_date"
                                           min="{{ today|date:'Y-m-d' }}"
                                         max="{{ max_leave_date|date:'Y-m-d' }}"
                                           required>
                                     <small class="form-text text-muted">Only dates from today up to one year ahead are allowed.</small>
                                </div>
                            </div>

                            <!-- Reason -->
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label>Reason for Leave</label>
                                    <textarea class="form-control"
                                              name="reason"
                                              rows="4"
                                              placeholder="Enter reason for leave"
                                              required></textarea>
                                </div>
                            </div>

                        </div>

                        <div class="mt-3">
                            <button type="submit" class="btn btn-danger mr-2">
                                Save Leave
                            </button>

                            <button type="reset" class="btn btn-light">
                                Clear
                            </button>
                        </div>

                    </form>

                </div>
            </div>

            </div>
        </div>
    </div>

        <script>
            (function () {
                var leaveDateInput = document.getElementById('leave_date');
                if (!leaveDateInput) {
                    return;
                }

                var today = new Date();
                var currentYear = today.getFullYear();
                var minDate = leaveDateInput.getAttribute('min');
                var maxDate = leaveDateInput.getAttribute('max');

                function validateLeaveDate() {
                    var value = leaveDateInput.value;
                    leaveDateInput.setCustomValidity('');

                    if (!value) {
                        return;
                    }

                    var parts = value.split('-');
                    if (parts.length !== 3) {
                        leaveDateInput.setCustomValidity('Please enter a valid date.');
                        return;
                    }

                    var yearPart = parts[0].replace(/\D/g, '').slice(0, 4);
                    if (parts[0] !== yearPart) {
                        leaveDateInput.value = [yearPart, parts[1], parts[2]].join('-');
                    }

                    if (yearPart.length > 4) {
                        leaveDateInput.setCustomValidity('Year must be 4 digits only.');
                        return;
                    }

                    if (yearPart.length === 4 && Number(yearPart) < currentYear) {
                        leaveDateInput.setCustomValidity('Year cannot be less than the current year.');
                        return;
                    }

                    if (minDate && leaveDateInput.value < minDate) {
                        leaveDateInput.setCustomValidity('Previous dates cannot be selected.');
                        return;
                    }

                    if (maxDate && leaveDateInput.value > maxDate) {
                        leaveDateInput.setCustomValidity('Leave date cannot be more than one year ahead.');
                    }
                }

                leaveDateInput.addEventListener('input', validateLeaveDate);
                leaveDateInput.addEventListener('change', validateLeaveDate);
                leaveDateInput.addEventListener('blur', validateLeaveDate);
            })();
        </script>
    
    {% include 'Admin/footer.html' %}
</div>
