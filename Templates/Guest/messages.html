{% if messages %}
<style>
.guest-toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 20000;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 380px;
}
.guest-toast {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border-radius: 12px;
  padding: 12px 14px;
  color: #ffffff;
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
  animation: guestToastSlideIn 0.25s ease-out;
}
.guest-toast-content {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  line-height: 1.35;
}
.guest-toast-close {
  background: transparent;
  border: 0;
  color: #ffffff;
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
  opacity: 0.8;
}
.guest-toast-close:hover {
  opacity: 1;
}
.guest-toast-success {
  background: linear-gradient(135deg, #1f9d55, #2bbf6a);
}
.guest-toast-error,
.guest-toast-danger {
  background: linear-gradient(135deg, #c53030, #e53e3e);
}
.guest-toast-warning {
  background: linear-gradient(135deg, #b7791f, #d69e2e);
}
.guest-toast-info {
  background: linear-gradient(135deg, #2b6cb0, #3182ce);
}
.guest-toast-fade {
  opacity: 0;
  transform: translateX(12px);
  transition: opacity 0.35s ease, transform 0.35s ease;
}
@keyframes guestToastSlideIn {
  from {
    opacity: 0;
    transform: translateX(14px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}
@media (max-width: 576px) {
  .guest-toast-container {
    top: 12px;
    left: 12px;
    right: 12px;
    max-width: unset;
  }
}
</style>

<div class="guest-toast-container" aria-live="polite" aria-atomic="true">
  {% for message in messages %}
  <div class="guest-toast guest-toast-{{ message.tags|default:'info' }}">
    <div class="guest-toast-content">
      <span>
        {% if message.tags == 'error' or message.tags == 'danger' %}
          <i class="fas fa-circle-exclamation"></i>
        {% elif message.tags == 'success' %}
          <i class="fas fa-circle-check"></i>
        {% elif message.tags == 'warning' %}
          <i class="fas fa-triangle-exclamation"></i>
        {% else %}
          <i class="fas fa-circle-info"></i>
        {% endif %}
      </span>
      <span>{{ message }}</span>
    </div>
    <button type="button" class="guest-toast-close" aria-label="Close notification" onclick="this.parentElement.remove()">&times;</button>
  </div>
  {% endfor %}
</div>

<script>
(function () {
  var toasts = document.querySelectorAll('.guest-toast');
  if (!toasts.length) {
    return;
  }

  toasts.forEach(function (toast) {
    setTimeout(function () {
      toast.classList.add('guest-toast-fade');
      setTimeout(function () {
        toast.remove();
      }, 360);
    }, 3800);
  });
})();
</script>
{% endif %}
