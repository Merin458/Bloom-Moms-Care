{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom Moms Care | Forgot Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(255, 111, 97, 0.35), #ffe6e2, #fff);
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 520px;
            background: #fff;
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 20px 60px rgba(255, 111, 97, 0.2);
        }
        .title { text-align: center; margin-bottom: 10px; color: #ff6f61; font-size: 28px; font-weight: 700; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; font-size: 14px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #333; font-weight: 500; }
        input {
            width: 100%;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            background: #f8f9fc;
        }
        input:focus { border-color: #ff6f61; background: #fff; box-shadow: 0 0 0 4px rgba(255, 111, 97, 0.1); }
        .btn {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, #ff6f61 0%, #ff8c82 100%);
            box-shadow: 0 6px 20px rgba(255, 111, 97, 0.35);
            transition: all 0.3s ease;
            margin-top: 6px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255, 111, 97, 0.45); }
        .links { margin-top: 16px; display: flex; justify-content: space-between; gap: 10px; }
        .links a { color: #ff6f61; text-decoration: none; font-size: 13px; font-weight: 600; }
        .alert { padding: 12px 14px; border-radius: 10px; margin-bottom: 18px; font-size: 14px; }
        .alert.success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .alert.error { background: #ffe1e6; color: #c41e3a; border-left: 4px solid #dc3545; }
    </style>
</head>
<body>
    {% include 'Guest/messages.html' %}

    <div class="card">
        <div class="title"><i class="fas fa-key"></i> Forgot Password</div>
        <div class="subtitle">Enter your registered email to receive OTP.</div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Registered Email</label>
                <input type="email" name="recovery_email" placeholder="Enter your registered email" required>
            </div>
            <button class="btn" type="submit"><i class="fas fa-paper-plane"></i> Send OTP</button>
        </form>

        <div class="links">
            <a href="{% url 'guestapp:login' %}"><i class="fas fa-arrow-left"></i> Back to Login</a>
            <a href="{% url 'guestapp:guestindex' %}">Go to Home</a>
        </div>
    </div>
</body>
</html>
