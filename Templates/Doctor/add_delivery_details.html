<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Delivery Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background: #f4f7fb;
        }
        .card {
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>
{% include 'Doctor/header.html' %}

<div class="container my-5">

    <div class="card p-4">
        <h4 class="text-primary mb-3">Add / Update Delivery Details</h4>
        <p><strong>Patient:</strong> {{ patient.patient_name }}</p>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Delivery Date</label>
                <input type="date" name="delivery_date" class="form-control" required
                       value="{{ delivery.delivery_date|default:'' }}">
            </div>

            <div class="mb-3">
                <label>Delivery Type</label>
                <select name="delivery_type" class="form-control" required>
                    <option value="Normal" {% if delivery.delivery_type == 'Normal' %}selected{% endif %}>Normal</option>
                    <option value="C-Section" {% if delivery.delivery_type == 'C-Section' %}selected{% endif %}>C-Section</option>
                    <option value="Assisted" {% if delivery.delivery_type == 'Assisted' %}selected{% endif %}>Assisted</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Baby Weight (kg)</label>
                <input type="number" step="0.01" name="baby_weight" class="form-control" required
                       value="{{ delivery.baby_weight|default:'' }}">
            </div>

            <div class="mb-3">
                <label>Baby Condition</label>
                <select name="baby_condition" class="form-control" required>
                    <option value="Good" {% if delivery.baby_condition == 'Good' %}selected{% endif %}>Good</option>
                    <option value="Stable" {% if delivery.baby_condition == 'Stable' %}selected{% endif %}>Stable</option>
                    <option value="Critical" {% if delivery.baby_condition == 'Critical' %}selected{% endif %}>Critical</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Mother Condition</label>
                <select name="mother_condition" class="form-control" required>
                    <option value="Good" {% if delivery.mother_condition == 'Good' %}selected{% endif %}>Good</option>
                    <option value="Stable" {% if delivery.mother_condition == 'Stable' %}selected{% endif %}>Stable</option>
                    <option value="Critical" {% if delivery.mother_condition == 'Critical' %}selected{% endif %}>Critical</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Remarks</label>
                <textarea name="remarks" class="form-control">{{ delivery.remarks|default:'' }}</textarea>
            </div>

            <a href="{% url 'doctorapp:patient_profile' patient.patient_id %}" class="btn btn-secondary">Back to Profile</a>
            <button class="btn btn-primary">Save Delivery Details</button>
        </form>
    </div>

</div>

{% include 'Doctor/Footer.html' %}

</body>
</html>
