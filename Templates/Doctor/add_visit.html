<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Visit</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }

        .page-title {
            font-weight: 600;
            color: #2c3e50;
        }

        label {
            font-weight: 500;
        }
    </style>
</head>
<body>
{% include 'Doctor/header.html' %}

<div class="container mt-5">

    <div class="mb-4">
        <h3 class="page-title">Add Visit Details</h3>
        <p class="text-muted">Patient: <strong>{{ patient.patient_name }}</strong></p>
    </div>

    <div class="card">
        <div class="card-body">

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label>Visit Details</label>
                    <textarea name="details" class="form-control" rows="4" required></textarea>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label>Weight (kg)</label>
                        <input type="number" step="0.01" name="weight" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Blood Pressure</label>
                        <input type="text" name="blood_pressure" class="form-control" placeholder="120/80">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Health Status</label>
                        <select name="health_status" class="form-control" required>
                            <option value="">Select</option>
                            <option value="Normal">Normal</option>
                            <option value="Needs Monitoring">Needs Monitoring</option>
                            <option value="Critical">Critical</option>
                        </select>
                    </div>
                </div>

                {% if patient.status != 'Transferred' %}
                <div class="mb-3">
                    <label>Next Visit Date</label>
                    <input type="date" name="next_visit_date" class="form-control">
                </div>
                {% endif %}

                <div class="text-end">
                    <button type="submit" class="btn btn-success">
                        Save Visit
                    </button>
                    <a href="javascript:history.back()" class="btn btn-secondary">
                        Cancel
                    </a>
                </div>

            </form>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

{% include 'Doctor/Footer.html' %}

</body>
</html>
