{% extends 'maternity/base.html' %}
{% block title %}Add Clinical Note{% endblock %}
{% block page_title %}Add Clinical Note for {{ patient }}{% endblock %}
{% block content %}
<div class="card" style="max-width: 700px;">
    <div class="card-header"><i class="fas fa-notes-medical me-2"></i>Clinical Note</div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Title *</label>{{ form.title }}
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Note *</label>{{ form.note }}
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Date *</label>{{ form.date_noted }}
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i> Save Note</button>
                <a href="{% url 'doctor_patient_detail' patient.pk %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
