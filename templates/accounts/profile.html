{% extends 'base.html' %}
{% block title %}My Profile – Bloom Moms Care{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <h3 class="page-title mb-4"><i class="bi bi-person-circle"></i> My Profile</h3>
    <div class="card">
      <div class="card-header">Update Profile</div>
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">First Name</label>
              {{ form.first_name }}
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Last Name</label>
              {{ form.last_name }}
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Email</label>
              {{ form.email }}
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Phone</label>
              {{ form.phone }}
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Profile Picture</label>
              {{ form.profile_picture }}
            </div>
          </div>
          <button type="submit" class="btn btn-primary mt-3"><i class="bi bi-save"></i> Save Changes</button>
          <a href="{% url 'dashboard' %}" class="btn btn-secondary mt-3 ms-2">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
