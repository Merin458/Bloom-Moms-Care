<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer circle with white border -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="white" stroke-width="10"/>
  
  <!-- Left decorative flowing curves -->
  <path d="M 18 75 Q 22 105, 35 135" fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <path d="M 12 85 Q 16 110, 28 138" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Bottom decorative curves -->
  <path d="M 35 155 Q 50 165, 70 172" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <path d="M 28 160 Q 45 170, 65 175" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Mother's head and hair (profile view facing right) -->
  <path d="M 65 55 Q 58 48, 58 40 Q 58 30, 68 28 Q 78 28, 85 35 Q 90 40, 92 48 Q 93 55, 90 62 Q 88 68, 82 72 Q 78 75, 72 75 Q 68 73, 65 70 Z" fill="white"/>
  
  <!-- Hair flowing details -->
  <path d="M 60 38 Q 55 42, 52 48 Q 50 55, 50 62" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <path d="M 88 50 Q 93 52, 96 56" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Hair detail lines on head -->
  <path d="M 70 42 Q 75 40, 80 42" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 68 50 Q 72 48, 76 50" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Mother's neck and shoulder -->
  <path d="M 70 75 L 68 85 Q 65 88, 60 88" fill="white"/>
  
  <!-- Mother's body - curved flowing form -->
  <path d="M 55 88 Q 40 100, 38 120 Q 36 140, 45 160 Q 55 175, 75 180 L 125 180 Q 145 175, 155 160 Q 164 140, 162 120 Q 160 100, 145 88 Q 135 82, 120 85 Q 105 80, 90 85 Q 75 82, 55 88 Z" fill="white"/>
  
  <!-- Mother's arm curve holding baby (left arm) -->
  <path d="M 65 90 Q 72 95, 80 102 Q 85 108, 88 118 Q 90 125, 92 135" fill="none" stroke="white" stroke-width="14" stroke-linecap="round"/>
  
  <!-- Inner arm detail -->
  <path d="M 75 95 Q 82 100, 88 108" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Baby's head -->
  <circle cx="125" cy="115" r="20" fill="white"/>
  
  <!-- Baby's body -->
  <ellipse cx="130" cy="145" rx="16" ry="22" fill="white"/>
  
  <!-- Baby's arm -->
  <circle cx="115" cy="128" r="7" fill="white"/>
  
  <!-- Mother's right arm over baby -->
  <path d="M 128 88 Q 135 100, 140 118 Q 142 128, 142 138" fill="none" stroke="white" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Bottom inner circle accent -->
  <path d="M 50 165 Q 100 185, 150 165" fill="none" stroke="white" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
  
  <!-- Sparkle/star accent -->
  <circle cx="168" cy="168" r="3" fill="white" opacity="0.8"/>
  <path d="M 168 162 L 168 174 M 162 168 L 174 168" stroke="white" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
</svg>
